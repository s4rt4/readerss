root = "."
tmp_dir = "tmp"

[build]
cmd = "templ generate && go build -o ./tmp/readress.exe ./cmd/server"
bin = "tmp/readress.exe"
full_bin = "tmp/readress.exe"
include_ext = ["go", "templ", "sql", "css"]
exclude_dir = ["bin", "tmp", "vendor", "data"]
delay = 1000
stop_on_error = true

[log]
time = true

[misc]
clean_on_exit = true
